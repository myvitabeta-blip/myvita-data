name: Update Hospital Data

on:
  schedule:
    - cron: '*/30 * * * *' # Updates every 30 minutes
  workflow_dispatch:       # Allows manual run

permissions:
  contents: write          # The "Key" to allow saving data

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: Run hospital update script
        run: python scraper.py # Updated to your filename

      - name: Commit and Push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff-index --quiet HEAD || (git commit -m "Update hospital data: $(date)" && git push)
